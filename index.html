<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{
  background:linear-gradient(135deg,#6fbf73,#3e8e41);
  padding:10px;
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

select,input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

/* KPI */
.kpi-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}

.card{
  flex:1;
  min-width:120px;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-align:center;
}

.blue{background:#2196F3;}
.purple{background:#9C27B0;}
.green{background:#4CAF50;}
.yellow{background:#fbc02d;}
.orange{background:#ff7043;}

/* SEARCH */
.search{
  margin-top:10px;
}

/* TABLE */
.table-box{
  margin-top:10px;
  max-height:55vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th{
  position:sticky;
  top:0;
  background:#2c3e50;
  color:#fff;
}

td,th{
  padding:8px;
  border-bottom:1px solid #eee;
}

tr:nth-child(even){background:#fafafa;}
tr:hover{background:#e8f4ff;cursor:pointer;}

/* STATUS */
.status{
  padding:3px 6px;
  border-radius:6px;
  color:#fff;
  font-size:11px;
}

.good{background:#2ecc71;}
.avg{background:#f39c12;}
.bad{background:#e74c3c;}

/* PAGINATION */
.pagination{
  text-align:center;
  margin-top:10px;
}

.page-btn{
  padding:5px 8px;
  margin:2px;
  border:none;
  background:#ddd;
  cursor:pointer;
}

.page-btn.active{
  background:#2c3e50;
  color:#fff;
}

/* DETAILS */
.section-title{
  margin-top:15px;
  text-align:center;
}

.summary{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

/* RESPONSIVE */
@media(max-width:768px){
  table{font-size:11px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h3>📊 Teacher Dashboard</h3>
  <div>
    <select id="teacher"></select>
    <input type="date" id="startDate">
    <input type="date" id="endDate">
  </div>
</div>

<div class="search">
  <input id="search" placeholder="Search student..." onkeyup="loadStudents()">
</div>

<div class="kpi-row">
  <div class="card blue"><h3 id="totalStudents"></h3><p>Students</p></div>
  <div class="card green"><h3 id="avgAttendance"></h3><p>Attendance</p></div>
  <div class="card yellow"><h3 id="avgObj"></h3><p>Objective</p></div>
  <div class="card orange"><h3 id="avgSubj"></h3><p>Subjective</p></div>
</div>

<div class="table-box">
<table id="table"></table>
</div>

<div id="pagination"></div>
<div id="details"></div>

</div>

<script>

// GLOBAL
let DATABASE=[];
let currentPage=1;
let rowsPerPage=20;

// CSV PARSER
function parseCSV(text){
 return text.split("\n")
 .filter(r=>r.trim()!="")
 .slice(1)
 .map(r=>r.split(","));
}

// LOAD CSV
async function loadCSV(){

 let s=await fetch("students.csv").then(r=>r.text());
 let l=await fetch("logs.csv").then(r=>r.text());

 let students=parseCSV(s);
 let logs=parseCSV(l);

 DATABASE = students.map(c=>{
  return {
   teacher:c[0],
   batch:c[1],
   section:c[2],
   name:c[3],
   totalClass:+c[4],
   joined:+c[5],
   rating:+c[6],
   lastClass:c[7],
   lastObj:c[8],
   lastSubj:c[9],
   logs: logs.filter(x=>x[0]===c[3]).map(x=>({
     date:x[1],
     attendance:x[2],
     obj:x[3]?+x[3]:"Absent",
     subj:x[4]?+x[4]:"Absent"
   }))
  }
 });

 init();
}

function init(){
 let teachers=[...new Set(DATABASE.map(d=>d.teacher))];
 document.getElementById("teacher").innerHTML=
 teachers.map(t=>`<option>${t}</option>`).join('');

 loadStudents();
}

// LOAD STUDENTS
function loadStudents(){

 let teacher=document.getElementById("teacher").value;
 let search=document.getElementById("search").value.toLowerCase();

 let data=DATABASE.filter(d=>d.teacher===teacher)
 .filter(d=>d.name.toLowerCase().includes(search));

 document.getElementById("totalStudents").innerText=data.length;

 let att=0,obj=0,subj=0;

 data.forEach(d=>{
  let logs=d.logs;

  let present=logs.filter(l=>l.attendance==="Present").length;
  let total=logs.length||1;

  let objArr=logs.map(l=>l.obj).filter(x=>typeof x==="number");
  let subjArr=logs.map(l=>l.subj).filter(x=>typeof x==="number");

  d.attendance=Math.round((present/total)*100);
  d.objAvg=objArr.length?Math.round(objArr.reduce((a,b)=>a+b,0)/objArr.length):0;
  d.subjAvg=subjArr.length?Math.round(subjArr.reduce((a,b)=>a+b,0)/subjArr.length):0;

  att+=d.attendance;
  obj+=d.objAvg;
  subj+=d.subjAvg;
 });

 let len=data.length||1;

 document.getElementById("avgAttendance").innerText=Math.round(att/len)+"%";
 document.getElementById("avgObj").innerText=Math.round(obj/len)+"%";
 document.getElementById("avgSubj").innerText=Math.round(subj/len)+"%";

 renderTable(data);
}

// TABLE
function renderTable(data){

 let start=(currentPage-1)*rowsPerPage;
 let page=data.slice(start,start+rowsPerPage);

 let html=`<tr>
 <th>Name</th><th>Attendance</th><th>Status</th><th>Obj%</th><th>Subj%</th>
 </tr>`;

 page.forEach(d=>{
  let cls=d.attendance<50?"bad":d.attendance<75?"avg":"good";
  let txt=d.attendance<50?"Risk":d.attendance<75?"Avg":"Good";

  html+=`
  <tr onclick="showDetails('${d.name}')">
   <td>${d.name}</td>
   <td>${d.attendance}%</td>
   <td><span class="status ${cls}">${txt}</span></td>
   <td>${d.objAvg}</td>
   <td>${d.subjAvg}</td>
  </tr>`;
 });

 document.getElementById("table").innerHTML=html;
 renderPagination(data.length);
}

// PAGINATION
function renderPagination(total){
 let pages=Math.ceil(total/rowsPerPage);
 let html="";

 for(let i=1;i<=pages;i++){
  html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
 }

 document.getElementById("pagination").innerHTML=html;
}

function goPage(p){
 currentPage=p;
 loadStudents();
}

// DETAILS
function showDetails(name){

 let s=DATABASE.find(d=>d.name===name);

 let html=`<h3 class="section-title">${name}</h3>`;

 html+=`<table>
 <tr><th>Date</th><th>Attendance</th><th>Obj</th><th>Subj</th></tr>`;

 s.logs.forEach(l=>{
  html+=`<tr>
   <td>${l.date}</td>
   <td>${l.attendance}</td>
   <td>${l.obj}</td>
   <td>${l.subj}</td>
  </tr>`;
 });

 html+="</table>";

 document.getElementById("details").innerHTML=html;
}

loadCSV();

</script>

</body>
</html>
