<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins';}

body{
  background:linear-gradient(135deg,#6fbf73,#3e8e41);
  padding:10px;
}

.container{
  width:100%;
  max-width:1400px;
  margin:auto;
  background:#fff;
  border-radius:20px;
  padding:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.header{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

select,input,button{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  background:#2c3e50;
  color:#fff;
  cursor:pointer;
}

/* KPI */
.kpi-row{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
}

.card{
  flex:1;
  min-width:120px;
  padding:10px;
  border-radius:10px;
  color:#fff;
  text-align:center;
}

.blue{background:#2196F3;}
.green{background:#4CAF50;}
.yellow{background:#fbc02d;}
.orange{background:#ff7043;}

/* TABLE */
.table-box{
  margin-top:10px;
  max-height:55vh;
  overflow:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th{
  position:sticky;
  top:0;
  background:#2c3e50;
  color:#fff;
}

td,th{
  padding:8px;
  border-bottom:1px solid #eee;
}

tr:nth-child(even){background:#fafafa;}
tr:hover{background:#e8f4ff;cursor:pointer;}

.status{
  padding:3px 6px;
  border-radius:6px;
  color:#fff;
  font-size:11px;
}

.good{background:#2ecc71;}
.avg{background:#f39c12;}
.bad{background:#e74c3c;}

.pagination{
  text-align:center;
  margin-top:10px;
}

.page-btn{
  padding:5px 8px;
  margin:2px;
  border:none;
  background:#ddd;
  cursor:pointer;
}

.page-btn.active{
  background:#2c3e50;
  color:#fff;
}

.section-title{
  margin-top:15px;
  text-align:center;
}

.summary{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.summary .card{
  flex:1;
}

/* 📱 Responsive */
@media(max-width:768px){
  table{font-size:11px;}
  .card{font-size:12px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h3>📊 Teacher Dashboard</h3>
  <div>
    <select id="teacher"></select>
    <input id="search" placeholder="Search..." onkeyup="loadStudents()">
  </div>
</div>

<div class="kpi-row">
  <div class="card blue"><h3 id="totalStudents"></h3><p>Students</p></div>
  <div class="card green"><h3 id="avgAttendance"></h3><p>Attendance</p></div>
  <div class="card yellow"><h3 id="avgObj"></h3><p>Objective</p></div>
  <div class="card orange"><h3 id="avgSubj"></h3><p>Subjective</p></div>
</div>

<div class="table-box">
<table id="table"></table>
</div>

<div id="pagination"></div>
<div id="details"></div>

</div>
